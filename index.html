<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olivew • Simulador Mobile App</title>
  <style>
    :root {
      --bg:#f4f8f4; --card:#fff; --text:#102018; --muted:#607267;
      --green:#0d6b35; --green-soft:#e8f6eb; --line:#d9eadc; --shadow:0 8px 22px rgba(8,40,18,.08);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; padding:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width:480px; margin:0 auto; min-height:100dvh; padding:12px; }
    .box {
      background:rgba(255,255,255,.95); border:1px solid var(--line); border-radius:20px; padding:14px; margin-bottom:12px; box-shadow:var(--shadow);
    }
    .hero { border-top:5px solid var(--green); padding:16px 14px; }
    .hero img { display:block; width:100%; max-width:250px; margin:0 auto 10px; background:#fff; padding:8px 10px; border-radius:16px; border:1px solid #e4efe6; }
    .hero h1 { margin:0; text-align:center; font-size:22px; }
    .segmented { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .tab-btn {
      min-height:46px; border-radius:14px; border:1px solid var(--line); background:#fff; color:#355145;
      font-weight:700; font-size:13px; cursor:pointer; touch-action:manipulation;
    }
    .tab-btn.active { background:linear-gradient(135deg,var(--green),#0a5a2c); color:#fff; border-color:transparent; }
    h2 { margin:0 0 12px; font-size:18px; }
    .field { margin-bottom:12px; }
    label { display:block; font-size:12px; font-weight:700; color:#446054; margin-bottom:6px; }
    input, select {
      width:100%; min-height:48px; border:1px solid var(--line); border-radius:14px; background:#fff; padding:12px 14px; font-size:16px; outline:none;
    }
    input:focus, select:focus { border-color:#79c48a; box-shadow:0 0 0 4px rgba(47,158,68,.10); }
    .metrics { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .metric { background:#fff; border:1px solid var(--line); border-left:4px solid rgba(13,107,53,.22); border-radius:16px; padding:12px; }
    .metric small { display:block; color:var(--muted); font-size:11px; margin-bottom:6px; }
    .metric strong { display:block; font-size:18px; line-height:1.2; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .btn {
      min-height:46px; border-radius:14px; font-size:14px; font-weight:700; cursor:pointer; border:0; touch-action:manipulation;
    }
    .btn.primary { background:linear-gradient(135deg,var(--green),#0a5a2c); color:#fff; box-shadow:0 8px 18px rgba(13,107,53,.16); }
    .btn.secondary { background:var(--green-soft); color:var(--green); border:1px solid #cfe8d4; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .list { display:grid; gap:10px; }
    .card { background:#fff; border:1px solid var(--line); border-top:4px solid rgba(13,107,53,.14); border-radius:16px; padding:12px; }
    .card-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; }
    .chip { background:var(--green-soft); color:var(--green); border:1px solid #cfe8d4; border-radius:999px; padding:5px 10px; font-size:12px; font-weight:700; }
    .row { display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px dashed #e3eee5; }
    .row:last-child { border-bottom:0; }
    .row span { font-size:12px; color:var(--muted); font-weight:700; }
    .row strong { font-size:14px; text-align:right; line-height:1.35; }
    .print-sheet { display:none; }
    @media print {
      .app > *:not(.print-sheet) { display:none !important; }
      .print-sheet { display:block; }
      .print-card { border:1px solid #d1d5db; border-radius:12px; padding:10px; margin-bottom:10px; }
      .print-row { display:flex; justify-content:space-between; gap:12px; padding:4px 0; border-bottom:1px solid #eee; }
      .print-row:last-child { border-bottom:0; }
      .print-row span { font-size:11px; color:#444; font-weight:700; }
      .print-row strong { font-size:12px; text-align:right; }
    }
  </style>
</head>

      <h1>Simulador Mobile</h1>
    </div>

    <div class="box" style="padding:8px;">
      <div class="segmented">
        <button class="tab-btn active" data-tab="limite" type="button">Valor Limite</button>
        <button class="tab-btn" data-tab="valor" type="button">Valor Liberado</button>
        <button class="tab-btn" data-tab="resumo" type="button">Resumo</button>
      </div>
    </div>

    <div class="box">
      <h2>Parâmetros</h2>
      <div class="field"><label>Tabela Olivew</label><select id="tableCode"><option>A</option><option>B</option><option>C</option></select></div>
      <div class="field"><label>Bandeira do cartão</label><select id="brand"><option>MasterCard</option><option>Visa</option><option>Elo</option><option>Hipercard</option><option>Demais Bandeiras</option></select></div>
      <div class="field" id="field-limitAvailable"><label>Limite disponível</label><input id="limitAvailable" value="3000" inputmode="decimal" /></div>
      <div class="field" id="field-requestedValue"><label>Valor solicitado</label><input id="requestedValue" value="8000" inputmode="decimal" /></div>
      <div class="field" style="margin-bottom:0;"><label>Parcela em foco</label><select id="focusInstallment"></select></div>
    </div>

    <div id="tab-limite" class="tab-content active">
      <div class="metrics" id="metricsLimit"></div>
      <div class="actions">
        <button class="btn primary" id="printLimitBtn" type="button">Imprimir</button>
        <button class="btn secondary" id="toggleLimitBtn" type="button">Mostrar todas</button>
      </div>
      <div class="list" id="limitList"></div>
    </div>

    <div id="tab-valor" class="tab-content">
      <div class="metrics" id="metricsValue"></div>
      <div class="actions">
        <button class="btn primary" id="printValueBtn" type="button">Imprimir</button>
        <button class="btn secondary" id="toggleValueBtn" type="button">Mostrar todas</button>
      </div>
      <div class="list" id="valueList"></div>
    </div>

    <div id="tab-resumo" class="tab-content">
      <div class="metrics" id="metricsSummary"></div>
    </div>

    <div class="print-sheet" id="printSheet"></div>
  </div>

<script>
const ADMIN_RATES = { A:0.10, B:0.08, C:0.06 };
const INSTALLMENTS = Array.from({length:18}, (_,i)=>`${i+1}X`);
const MARKET_RATES = {
"1X":{"MasterCard":0.0499,"Visa":0.0499,"Elo":0.0526,"Hipercard":0.0526,"Demais Bandeiras":0.0526},
"2X":{"MasterCard":0.051,"Visa":0.051,"Elo":0.0584,"Hipercard":0.0584,"Demais Bandeiras":0.053},
"3X":{"MasterCard":0.0576,"Visa":0.0576,"Elo":0.0667,"Hipercard":0.0667,"Demais Bandeiras":0.0599},
"4X":{"MasterCard":0.0643,"Visa":0.0643,"Elo":0.075,"Hipercard":0.075,"Demais Bandeiras":0.0668},
"5X":{"MasterCard":0.0709,"Visa":0.0709,"Elo":0.0831,"Hipercard":0.0831,"Demais Bandeiras":0.0735},
"6X":{"MasterCard":0.0813,"Visa":0.0813,"Elo":0.0912,"Hipercard":0.0912,"Demais Bandeiras":0.0802},
"7X":{"MasterCard":0.0891,"Visa":0.0891,"Elo":0.1071,"Hipercard":0.1071,"Demais Bandeiras":0.0947},
"8X":{"MasterCard":0.097,"Visa":0.097,"Elo":0.115,"Hipercard":0.1013,"Demais Bandeiras":0.1013},

"10X":{"MasterCard":0.1125,"Visa":0.1125,"Elo":0.1305,"Hipercard":0.1143,"Demais Bandeiras":0.1143},
"11X":{"MasterCard":0.1201,"Visa":0.1201,"Elo":0.1381,"Hipercard":0.1206,"Demais Bandeiras":0.1206},
"12X":{"MasterCard":0.1276,"Visa":0.1276,"Elo":0.1456,"Hipercard":0.127,"Demais Bandeiras":0.127},
"13X":{"MasterCard":0.1431,"Visa":0.1431,"Elo":0.1531,"Hipercard":0.1334,"Demais Bandeiras":0.1334},
"14X":{"MasterCard":0.1505,"Visa":0.1505,"Elo":0.1605,"Hipercard":0.1394,"Demais Bandeiras":0.1394},
"15X":{"MasterCard":0.1577,"Visa":0.1577,"Elo":0.1677,"Hipercard":0.1456,"Demais Bandeiras":0.1456},
"16X":{"MasterCard":0.1649,"Visa":0.1649,"Elo":0.1749,"Hipercard":0.1517,"Demais Bandeiras":0.1517},
"17X":{"MasterCard":0.1721,"Visa":0.1721,"Elo":0.1821,"Hipercard":0.1577,"Demais Bandeiras":0.1577},
"18X":{"MasterCard":0.1791,"Visa":0.1791,"Elo":0.1891,"Hipercard":0.1637,"Demais Bandeiras":0.1637},
};
const fmtCurrency = new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'});
const fmtPercent = new Intl.NumberFormat('pt-BR', {style:'percent', minimumFractionDigits:2, maximumFractionDigits:2});
let showAllLimit=false, showAllValue=false;
function num(v) { if(typeof v==='number') return v; const x=String(v||'').replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.-]/g,''); const n=Number(x); return Number.isFinite(n)?n:0; }
function count(label) { return Number(String(label).replace(/[^0-9]/g,'')) || 1; }
function adminRate(code) { return ADMIN_RATES[code] ?? 0; }
function marketRate(inst, brand) { return MARKET_RATES[inst]?.[brand] ?? 0; }
function releasedValue(limit, code, brand, inst) { const m=marketRate(inst,brand), a=adminRate(code); return num(limit)*(1-m)/(1+a); }
function requiredLimit(value, code, brand, inst) { const m=marketRate(inst,brand), a=adminRate(code); return num(value)*(1+a)/(1-m); }
function monthlyRateFromLimit(limit, released, inst) { return (1-(released/num(limit||1)))/count(inst); }
function monthlyRateFromValue(value, need, inst) { return (1-(num(value)/(need||1)))/count(inst); }
function metric(label, value) { return `<div class="metric"><small>${label}</small><strong>${value}</strong></div>`; }
function getState() {
  return {
    tableCode: document.getElementById('tableCode').value,
    brand: document.getElementById('brand').value,
    limitAvailable: document.getElementById('limitAvailable').value,
    requestedValue: document.getElementById('requestedValue').value,
    focusInstallment: document.getElementById('focusInstallment').value,
  };
}
function limitCards(s) {
  const data=INSTALLMENTS.map(inst=>{ const liberado=releasedValue(s.limitAvailable,s.tableCode,s.brand,inst); return {parcela:inst, limite:num(s.limitAvailable), valorParcela:num(s.limitAvailable)/count(inst), valorLiberado:liberado, taxaMes:monthlyRateFromLimit(s.limitAvailable, liberado, inst), column8:''}; });
  return showAllLimit ? data : data.filter(x=>x.parcela===s.focusInstallment);
}
function valueCards(s) {
  const data=INSTALLMENTS.map(inst=>{ const need=requiredLimit(s.requestedValue,s.tableCode,s.brand,inst); return {parcela:inst, valorSolicitado:num(s.requestedValue), valorParcela:need/count(inst), limiteNecessario:need, taxaMes:monthlyRateFromValue(s.requestedValue,need,inst)}; });
  return showAllValue ? data : data.filter(x=>x.parcela===s.focusInstallment);
}
function render() {
  const s=getState(); const rel=releasedValue(s.limitAvailable,s.tableCode,s.brand,s.focusInstallment); const need=requiredLimit(s.requestedValue,s.tableCode,s.brand,s.focusInstallment); const a=adminRate(s.tableCode);
  document.getElementById('metricsLimit').innerHTML=[metric('Parcela',s.focusInstallment),metric('Valor liberado',fmtCurrency.format(rel)),metric('Taxa ao mês',fmtPercent.format(monthlyRateFromLimit(s.limitAvailable,rel,s.focusInstallment))),metric('Lucro tabela',fmtCurrency.format(rel*a))].join('');
  document.getElementById('metricsValue').innerHTML=[metric('Parcela',s.focusInstallment),metric('Limite necessário',fmtCurrency.format(need)),metric('Taxa ao mês',fmtPercent.format(monthlyRateFromValue(s.requestedValue,need,s.focusInstallment))),metric('Lucro tabela',fmtCurrency.format(num(s.requestedValue)*a))].join('');
  document.getElementById('metricsSummary').innerHTML=[metric('Tabela',s.tableCode),metric('Bandeira',s.brand),metric('Taxa ADM',fmtPercent.format(a)),metric('Foco',s.focusInstallment)].join('');
  document.getElementById('toggleLimitBtn').textContent = showAllLimit ? 'Mostrar 1' : 'Mostrar todas';
  document.getElementById('toggleValueBtn').textContent = showAllValue ? 'Mostrar 1' : 'Mostrar todas';
  document.getElementById('limitList').innerHTML=limitCards(s).map(row=>`<div class="card"><div class="card-head"><strong>Valor Limite</strong><span class="chip">${row.parcela}</span></div><div class="row"><span>Limite disponível</span><strong>${fmtCurrency.format(row.limite)}</strong></div><div class="row"><span>Valor da parcela</span><strong>${fmtCurrency.format(row.valorParcela)}</strong></div><div class="row"><span>Valor liberado</span><strong>${fmtCurrency.format(row.valorLiberado)}</strong></div><div class="row"><span>Taxa ao mês</span><strong>${fmtPercent.format(row.taxaMes)}</strong></div><div class="row"><span>Column 8</span><strong>${row.column8}</strong></div></div>`).join('');
  document.getElementById('valueList').innerHTML=valueCards(s).map(row=>`<div class="card"><div class="card-head"><strong>Valor Liberado</strong><span class="chip">${row.parcela}</span></div><div class="row"><span>Valor solicitado</span><strong>${fmtCurrency.format(row.valorSolicitado)}</strong></div><div class="row"><span>Valor da parcela</span><strong>${fmtCurrency.format(row.valorParcela)}</strong></div><div class="row"><span>Limite necessário</span><strong>${fmtCurrency.format(row.limiteNecessario)}</strong></div><div class="row"><span>Taxa ao mês</span><strong>${fmtPercent.format(row.taxaMes)}</strong></div></div>`).join('');
}
function setActiveTab(name) { document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.toggle('active', btn.dataset.tab===name)); document.querySelectorAll('.tab-content').forEach(el=>el.classList.toggle('active', el.id==='tab-'+name)); }
function buildPrintSheet(kind) {
  const s=getState(); const root=document.getElementById('printSheet'); const rows=kind==='limite'?limitCards(s):valueCards(s); const title=kind==='limite'?'Detalhamento de parcelas — Valor Limite':'Detalhamento de parcelas — Valor Liberado';
  root.innerHTML=`<h1>${title}</h1>`+rows.map(row=>kind==='limite'?`<div class="print-card"><div class="print-row"><span>Parcela</span><strong>${row.parcela}</strong></div><div class="print-row"><span>Limite disponível</span><strong>${fmtCurrency.format(row.limite)}</strong></div><div class="print-row"><span>Valor da parcela</span><strong>${fmtCurrency.format(row.valorParcela)}</strong></div><div class="print-row"><span>Valor liberado</span><strong>${fmtCurrency.format(row.valorLiberado)}</strong></div><div class="print-row"><span>Taxa ao mês</span><strong>${fmtPercent.format(row.taxaMes)}</strong></div></div>`:`<div class="print-card"><div class="print-row"><span>Parcela</span><strong>${row.parcela}</strong></div><div class="print-row"><span>Valor solicitado</span><strong>${fmtCurrency.format(row.valorSolicitado)}</strong></div><div class="print-row"><span>Valor da parcela</span><strong>${fmtCurrency.format(row.valorParcela)}</strong></div><div class="print-row"><span>Limite necessário</span><strong>${fmtCurrency.format(row.limiteNecessario)}</strong></div><div class="print-row"><span>Taxa ao mês</span><strong>${fmtPercent.format(row.taxaMes)}</strong></div></div>`).join('');
  window.print();
}
function bindTap(id, fn) {
  const el=document.getElementById(id); const handler=(e)=>{ e.preventDefault(); fn(); };
  el.addEventListener('click', handler, false); el.addEventListener('touchend', handler, false);
}
for(const inst of INSTALLMENTS) { const opt=document.createElement('option'); opt.value=inst; opt.textContent=inst; document.getElementById('focusInstallment').appendChild(opt); }
document.getElementById('focusInstallment').value='12X';
document.querySelectorAll('input,select').forEach(el=>{ el.addEventListener('input', render, false); el.addEventListener('change', render, false); });
document.querySelectorAll('.tab-btn').forEach(btn=>{ const fn=()=>setActiveTab(btn.dataset.tab); btn.addEventListener('click', fn, false); btn.addEventListener('touchend', (e)=>{e.preventDefault(); fn();}, false); });
bindTap('toggleLimitBtn', ()=>{ showAllLimit=!showAllLimit; render(); });
bindTap('toggleValueBtn', ()=>{ showAllValue=!showAllValue; render(); });
bindTap('printLimitBtn', ()=>buildPrintSheet('limite'));
bindTap('printValueBtn', ()=>buildPrintSheet('valor'));
function updateVisibleFields() {
  const limiteTab = document.getElementById('tab-limite').classList.contains('active');
  document.getElementById('field-limitAvailable').style.display = limiteTab ? '' : 'none';
  document.getElementById('field-requestedValue').style.display = limiteTab ? 'none' : '';
}
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click', ()=>setTimeout(updateVisibleFields, 0)));
updateVisibleFields();
render();
</script>
</body>
</html>
